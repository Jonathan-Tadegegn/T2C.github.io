<!DOCTYPE HTML>
<html>
	<head>
		<title>Trash 2 Change (T2C) - Home</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		
		<!-- Clean Modern Font Setup -->
		<link rel="preconnect" href="https://googleapis.com">
		<link rel="preconnect" href="https://gstatic.com" crossorigin>
		<link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

		<style>
			/* RESET DEFALUTS */
			* { box-sizing: border-box; margin: 0; padding: 0; }
			
			body {
				font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
				background-color: #f8f9fa;
				color: #1b4332;
				letter-spacing: -0.01em;
				display: block;
				min-height: 100vh;
			}

			/* HEADER STYLING */
			#header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 0 2rem;
				height: 4rem;
				background-color: #1b4332;
				color: #ffffff;
				position: fixed;
				top: 0;
				width: 100%;
				z-index: 1000;
			}
			#header h1 a {
				color: #ffffff;
				text-decoration: none;
				font-weight: 700;
				font-size: 1.5rem;
			}

			/* HORIZONTAL NAVIGATION BAR (Instead of broken dropdown) */
			#nav-links {
				display: flex;
				list-style: none;
				gap: 1.5rem;
				align-items: center;
			}
			#nav-links a {
				color: #ffffff;
				text-decoration: none;
				font-weight: 500;
				font-size: 0.95rem;
				transition: color 0.2s ease;
			}
			#nav-links a:hover {
				color: #b7e4c7;
			}
			#nav-links .coming-soon {
				opacity: 0.5;
				cursor: default;
			}
			#nav-links .donate-btn {
				background-color: #2d6a4f;
				padding: 0.5rem 1rem;
				border-radius: 4px;
				font-weight: 600;
			}
			#nav-links .donate-btn:hover {
				background-color: #40916c;
				color: #ffffff;
			}

			/* MAIN HERO BANNER */
			#banner {
				display: flex;
				align-items: center;
				justify-content: center;
				text-align: center;
				min-height: 100vh;
				background: linear-gradient(rgba(27, 67, 50, 0.85), rgba(27, 67, 50, 0.85)), url('https://unsplash.com');
				background-size: cover;
				background-position: center;
				color: #ffffff;
				padding: 4rem 2rem;
				animation: quickFade 0.4s ease-in-out forwards;
			}
			#banner .inner {
				max-width: 40rem;
			}
			#banner h2 {
				font-size: 3.5rem;
				font-weight: 800;
				margin-bottom: 1rem;
				letter-spacing: -0.03em;
				line-height: 1.1;
			}
			#banner p {
				font-size: 1.3rem;
				color: #d8f3dc;
				font-weight: 400;
				line-height: 1.5;
			}

			/* FOOTER STYLING */
			#footer {
				background-color: #1b4332;
				padding: 3rem 2rem;
				text-align: center;
				border-top: 1px solid #2d6a4f;
			}
			#footer p {
				color: #b7e4c7;
				font-size: 0.9rem;
			}

			@keyframes quickFade {
				from { opacity: 0; }
				to { opacity: 1; }
			}

			/* RESPONSIVE DESIGN FOR MOBILE PHONES */
			@media (max-width: 768px) {
				#header { padding: 0 1rem; }
				#nav-links { gap: 0.8rem; }
				#nav-links a { font-size: 0.8rem; }
				#banner h2 { font-size: 2.2rem; }
				#banner p { font-size: 1rem; }
			}
		</style>
	</head>
	<body>

		<!-- Header Menu Area -->
		<header id="header">
			<h1><a href="index.html">t2c</a></h1>
			<nav>
				<ul id="nav-links">
					<li><a href="index.html">Home</a></li>
					<li><a href="about.html">About Us</a></li>
					<li><a href="mission.html">Our Mission</a></li>
					<li><a href="officers.html">Meet the Officers</a></li>
					<li><a class="coming-soon">Branches (Coming Soon)</a></li>
					<li><a href="apply.html">Apply Now</a></li>
					<li><a href="https://paypal.com" class="donate-btn" target="_blank">Donate Now</a></li>
				</ul>
			</nav>
		</header>

		<!-- Main Page Presentation -->
		<section id="banner">
			<div class="inner">
				<h2>Trash 2 Change</h2>
				<p>Transforming waste into community value and sustainability.</p>
			</div>
		</section>

		<!-- Footer Area -->
		<footer id="footer">
			<p>&copy; Trash 2 Change Organization. All rights reserved.</p>
		</footer>

	</body>
</html>
